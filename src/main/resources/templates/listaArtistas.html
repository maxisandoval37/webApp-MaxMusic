<!DOCTYPE html>
<html lang="en">
<head th:insert="~{fragments/header}"></head>
<body class="container mt-5">

<h2>Lista de Artistas</h2>

<table class="table table-bordered">
    <thead class="thead-dark">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Nacionalidad</th>
        <th>Fecha de Nacimiento</th>
        <th>Email</th>
        <th>Álbumes</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="artista : ${artistas}">
        <td th:text="${artista.id}"></td>
        <td th:text="${userService.obtenerUsuarioPorArtista(artista)?.nombre ?: 'Nombre no disponible'}"></td>
        <td th:text="${userService.obtenerUsuarioPorArtista(artista)?.apellido ?: 'Apellido no disponible'}"></td>
        <td th:text="${artista.nacionalidad}"></td>
        <td th:text="${artista.fechaNacimiento}"></td>
        <td th:text="${artista.email}"></td>
        <td>
            <label>
                <select disabled size="5" style="max-height: 75px; overflow-y: auto;">
                    <option th:each="album : ${artista.getAlbumesPublicados()}" th:value="${album.id}" th:text="${album.titulo}"></option>
                </select>
            </label>
        </td>
    </tr>
    </tbody>
</table>

<div th:replace="~{fragments/footer}"></div>
</body>
</html>
