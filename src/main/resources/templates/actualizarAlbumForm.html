<!DOCTYPE html>
<html lang="en">
<head th:insert="~{fragments/header}"></head>
<body class="container mt-5">

<h2 class="mb-4">Actualizar Álbum</h2>

<form th:action="@{/actualizarAlbum/{id}(id=${album.id})}" method="post">
    <input type="hidden" name="_method" value="put">

    <div class="form-group">
        <label for="titulo">Título:</label>
        <input type="text" class="form-control" id="titulo" name="titulo" th:value="${album.titulo}" required>
    </div>

    <div class="form-group">
        <label for="genero">Género:</label>
        <input type="text" class="form-control" id="genero" name="genero" th:value="${album.getGenero()}" required>
    </div>

    <div class="form-group">
        <label for="fechaEstreno">Fecha de Estreno:</label>
        <input type="date" class="form-control" id="fechaEstreno" name="fechaEstreno" th:value="${album.getFechaEstreno()}" min="1970-01-01" max="3000-12-31" required>
    </div>

    <!-- Lista desplegable para seleccionar el artista -->
    <div class="form-group">
        <label for="idArtista">Artista:</label>
        <select class="form-control" id="idArtista" name="idArtista" required>
            <option th:each="artista : ${artistas}" th:value="${artista.id}" th:text="${artista.email}"></option>
        </select>
    </div>

    <!-- Lista desplegable para seleccionar las canciones-->
    <div class="form-group">
        <label for="idCanciones">Canciones:</label>
        <select class="form-control" id="idCanciones" name="idCanciones" multiple>
            <option th:each="cancion : ${canciones}" th:value="${cancion.id}" th:text="${cancion.nombre}" th:selected="${album.getCanciones() != null and album.getCanciones.contains(cancion)}"></option>
        </select>
    </div>

    <br>

    <button type="submit" class="btn btn-primary">Actualizar Album</button>
</form>

<div th:replace="~{fragments/footer}"></div>
</body>
</html>
